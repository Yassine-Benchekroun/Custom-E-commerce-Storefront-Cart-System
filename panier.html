<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Panier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #2c3e50;
            font-size: 2rem;
        }

        .back-btn {
            padding: 12px 24px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .cart-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
        }

        .cart-items {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .cart-item {
            display: grid;
            grid-template-columns: 120px 1fr auto;
            gap: 20px;
            padding: 20px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .cart-item:hover {
            border-color: #3498db;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .item-image {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            overflow: hidden;
            background: #f8f9fa;
        }

        .item-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item-info h3 {
            color: #2c3e50;
            font-size: 1.3rem;
        }

        .item-marque {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            width: fit-content;
        }

        .marque-samsung { background: #1428a0; color: white; }
        .marque-iphone { background: #000000; color: white; }
        .marque-xiaomi { background: #ff6700; color: white; }

        .item-price {
            font-size: 1.5rem;
            color: #e74c3c;
            font-weight: bold;
        }

        .item-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: flex-end;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            border: 2px solid #3498db;
            background: white;
            color: #3498db;
            border-radius: 50%;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .qty-btn:hover {
            background: #3498db;
            color: white;
        }

        .qty-display {
            font-size: 1.2rem;
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        .remove-btn {
            padding: 8px 16px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .remove-btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .cart-summary {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .cart-summary h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e1e8ed;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            color: #5d6d7e;
            font-size: 1.1rem;
        }

        .summary-row.total {
            font-size: 1.5rem;
            color: #2c3e50;
            font-weight: bold;
            border-top: 2px solid #e1e8ed;
            margin-top: 15px;
            padding-top: 15px;
        }

        .summary-row.total .amount {
            color: #e74c3c;
        }

        .checkout-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .checkout-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(39, 174, 96, 0.4);
        }

        .checkout-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }

        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .empty-cart-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .empty-cart h2 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .empty-cart p {
            color: #7f8c8d;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .continue-shopping {
            padding: 15px 30px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .continue-shopping:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .clear-cart-btn {
            padding: 10px 20px;
            background: #95a5a6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .clear-cart-btn:hover {
            background: #7f8c8d;
        }

        @media (max-width: 968px) {
            .cart-container {
                grid-template-columns: 1fr;
            }

            .cart-item {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .item-controls {
                align-items: center;
            }

            .cart-summary {
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛒 Mon Panier</h1>
            <a href="index.html" class="back-btn">← Continuer mes achats</a>
        </header>

        <div id="cartContent">
            <!-- Cart will be loaded here by JavaScript -->
        </div>
    </div>

    <script>
        class ShoppingCart {
            constructor() {
                this.cart = this.loadCart();
                this.init();
            }

            init() {
                this.displayCart();
            }

            loadCart() {
                const saved = localStorage.getItem('shopping_cart');
                return saved ? JSON.parse(saved) : [];
            }

            saveCart() {
                localStorage.setItem('shopping_cart', JSON.stringify(this.cart));
            }

            displayCart() {
                const container = document.getElementById('cartContent');

                if (this.cart.length === 0) {
                    container.innerHTML = `
                        <div class="empty-cart">
                            <div class="empty-cart-icon">🛒</div>
                            <h2>Votre panier est vide</h2>
                            <p>Découvrez nos produits et ajoutez vos téléphones préférés!</p>
                            <a href="index.html" class="continue-shopping">Voir le catalogue</a>
                        </div>
                    `;
                    return;
                }

                const subtotal = this.calculateSubtotal();
                const shipping = subtotal > 0 ? 0 : 0; // Livraison gratuite
                const total = subtotal + shipping;

                container.innerHTML = `
                    <div class="cart-container">
                        <div class="cart-items">
                            <button class="clear-cart-btn" onclick="cart.clearCart()">🗑️ Vider le panier</button>
                            ${this.cart.map(item => this.renderCartItem(item)).join('')}
                        </div>
                        <div class="cart-summary">
                            <h2>Résumé de la commande</h2>
                            <div class="summary-row">
                                <span>Sous-total (${this.getTotalItems()} articles)</span>
                                <span>${this.formatPrice(subtotal)} DHS</span>
                            </div>
                            <div class="summary-row">
                                <span>Livraison</span>
                                <span style="color: #27ae60; font-weight: 600;">Gratuite</span>
                            </div>
                            <div class="summary-row total">
                                <span>Total</span>
                                <span class="amount">${this.formatPrice(total)} DHS</span>
                            </div>
                            <button class="checkout-btn" onclick="cart.checkout()">
                                ✓ Procéder au paiement
                            </button>
                        </div>
                    </div>
                `;
            }

            renderCartItem(item) {
                return `
                    <div class="cart-item">
                        <div class="item-image">
                            <img src="${item.image}" alt="${item.nom}" 
                                 onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwIiBoZWlnaHQ9IjEyMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZjhmOWZhIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtc2l6ZT0iMTQiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj7imYAgSW1hZ2U8L3RleHQ+PC9zdmc+'">
                        </div>
                        <div class="item-info">
                            <span class="item-marque marque-${item.marque.toLowerCase()}">${item.marque}</span>
                            <h3>${item.nom}</h3>
                            <p style="color: #7f8c8d;">Couleur: ${item.couleur}</p>
                            <div class="item-price">${this.formatPrice(item.prix)} DHS</div>
                        </div>
                        <div class="item-controls">
                            <div class="quantity-control">
                                <button class="qty-btn" onclick="cart.decreaseQuantity(${item.id})">−</button>
                                <span class="qty-display">${item.quantity}</span>
                                <button class="qty-btn" onclick="cart.increaseQuantity(${item.id})">+</button>
                            </div>
                            <div style="font-weight: 600; color: #2c3e50;">
                                Total: ${this.formatPrice(item.prix * item.quantity)} DHS
                            </div>
                            <button class="remove-btn" onclick="cart.removeItem(${item.id})">
                                🗑️ Supprimer
                            </button>
                        </div>
                    </div>
                `;
            }

            increaseQuantity(id) {
                const item = this.cart.find(i => i.id === id);
                if (item && item.quantity < 99) {
                    item.quantity++;
                    this.saveCart();
                    this.displayCart();
                }
            }

            decreaseQuantity(id) {
                const item = this.cart.find(i => i.id === id);
                if (item && item.quantity > 1) {
                    item.quantity--;
                    this.saveCart();
                    this.displayCart();
                }
            }

            removeItem(id) {
                const item = this.cart.find(i => i.id === id);
                if (item && confirm(`Voulez-vous vraiment supprimer ${item.marque} ${item.nom} du panier?`)) {
                    this.cart = this.cart.filter(i => i.id !== id);
                    this.saveCart();
                    this.displayCart();
                }
            }

            clearCart() {
                if (confirm('Voulez-vous vraiment vider tout le panier?')) {
                    this.cart = [];
                    this.saveCart();
                    this.displayCart();
                }
            }

            calculateSubtotal() {
                return this.cart.reduce((sum, item) => sum + (item.prix * item.quantity), 0);
            }

            getTotalItems() {
                return this.cart.reduce((sum, item) => sum + item.quantity, 0);
            }

            formatPrice(prix) {
                return prix.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
            }

            checkout() {
                const total = this.calculateSubtotal();
                const itemCount = this.getTotalItems();
                
                alert(`🎉 Merci pour votre commande!\n\nRésumé:\n- ${itemCount} article(s)\n- Total: ${this.formatPrice(total)} DHS\n\nVous allez être redirigé vers la page de paiement.\n(Fonctionnalité à implémenter)`);
                
                // Optionnel: vider le panier après achat
                // this.clearCart();
            }
        }

        // Initialiser le panier
        let cart;
        document.addEventListener('DOMContentLoaded', () => {
            cart = new ShoppingCart();
        });
    </script>
</body>
</html>
